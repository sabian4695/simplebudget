<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#4c809e" />
    <meta name="description" content="A simple budget app to track your income and expenses." />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="simpleBudget" />
    <title>simpleBudget</title>
    <script>
        try {
            var t = localStorage.getItem('userTheme');
            if (t === 'light') document.documentElement.style.backgroundColor = '#eee';
            else document.documentElement.style.backgroundColor = '#161616';
        } catch (e) { }
    </script>
</head>

<body style="background-color:#161616">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>

</html>
